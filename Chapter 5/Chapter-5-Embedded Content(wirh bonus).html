<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Chapter-5.css">
</head>
<body>
    <header>
        <h1>Audio Sampler</h1>
    </header>

    <main>

        <section class="soundboard">

            <!-- Each button represents a sound sample -->
            <!-- data-sound stores the audio file name -->
            <button data-sound="a-ha.mp3">Ah-ha!</button>
            <button data-sound="dance.mp3">Dance!</button>
            <button data-sound="back-of-the-net.mp3">Back of the net!</button>
            <button data-sound="bang-out-of-order-mate.mp3">Bang out of order!</button>
            <button data-sound="jurassic-park-theme-tune.mp3">Jurassic Park</button>
            <button data-sound="smell-my-cheese.mp3">Smell my cheese</button>
            <button data-sound="goallllllllllllllll-footabll-goallllllllllllllll-pc.mp3">Goal</button>
            <button data-sound="echoing-kiss-my-face.mp3">Kiss my face</button>
            <button data-sound="hello-partridge.mp3">Hello Partridge</button>


        </section>
    </main>

    <!-- Footer section -->
    <footer>
        <p>© Local Radio Soundboard</p>
    </footer>
    
     <!-- Link to JavaScript file -->
    <script src="Chapter-5.js"></script>
</body>
</html>
