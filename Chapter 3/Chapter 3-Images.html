<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <!-- Link to external CSS file -->
    <link rel="stylesheet" href="Chapter 3-Images.css" type="text/css">

</head>
<body>
   
   <!--Website header-->
    <h1>Car Gallery</h1>

      <!-- Gallery container: wraps all the image cards -->
    <div class="images">  
        <!-- 'gallery' class helps us style the container
        'alt' makes the text shown if image doesn't load (important for accessibility)
        'title' shows a tooltip when you hover over the image
        'class' allows us to apply specific CSS styles, like filters or effects-->
        <img src="https://images.unsplash.com/photo-1688398658141-d39eda099217?q=80&w=387&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" 
        alt="Porsche 911 GT3 RS" 
        title="White Porsche 911 GT3 RS with red rims parked beside a modern building" 
        class="img1">

        <p>Photo by Unsplash - Free to use under Unsplash License (commercial use allowed)</p> <!--caption for the image-->
    </div>
    
    <!-- Image 2 -->
    <div class="images">
        <img src="https://images.unsplash.com/photo-1591293835940-934a7c4f2d9b?q=80&w=387&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        alt="Classic white Ford Mustang Fastback"
        title="Vintage Ford Mustang Fastback in an industrial setting"
        class="img2">

        <p>Photo by Unsplash - Free to use under Unsplash License (commercial use allowed)</p>
    </div>

      <!-- Image 3 -->
    <div class="images">
        <img src="https://images.unsplash.com/photo-1660209336030-ea4d2d0e0412?q=80&w=773&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        alt="Mitsubishi Evolution IX"
        title="JDM Car"
        class="img3">

        <p>Photo by Unsplash - Free to use under Unsplash License (commercial use allowed)</p>
    </div>

</body>
</html>
